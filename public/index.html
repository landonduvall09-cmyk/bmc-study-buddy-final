<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMC Study Buddy · Real Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
    }
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      color: #333;
    }
    .login-card input, .login-card select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    .main-app {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    .navbar {
      background: #16213e;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 20px;
      font-weight: bold;
    }
    .logo span { color: #00ff88; }
    .chat-container {
      display: flex;
      height: calc(100vh - 60px);
    }
    .sidebar {
      width: 260px;
      background: #16213e;
      padding: 20px;
      overflow-y: auto;
    }
    .sidebar h3 {
      color: #00ff88;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .channel-list, .online-list {
      list-style: none;
      margin-bottom: 25px;
    }
    .channel-list li, .online-list li {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 8px;
      color: #ccc;
    }
    .channel-list li:hover, .online-list li:hover {
      background: #1f2a48;
    }
    .channel-list li.active {
      background: #00ff88;
      color: #16213e;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f0f1a;
    }
    .chat-header {
      padding: 15px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-size: 18px; }
    .chat-actions i {
      margin-left: 15px;
      cursor: pointer;
      font-size: 18px;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 15px;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.own {
      background: #00ff88;
      color: #16213e;
      align-self: flex-end;
    }
    .message.other {
      background: #2a2a3a;
      align-self: flex-start;
    }
    .message.system {
      background: #333;
      align-self: center;
      font-size: 12px;
      max-width: 80%;
    }
    .message .sender {
      font-size: 12px;
      margin-bottom: 5px;
      opacity: 0.8;
    }
    .message .time {
      font-size: 10px;
      margin-top: 5px;
      opacity: 0.6;
    }
    .message img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 5px;
    }
    .message .file-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.2);
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      margin-top: 5px;
    }
    .input-area {
      padding: 20px;
      background: #16213e;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .input-area input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #2a2a3a;
      color: white;
      font-size: 14px;
    }
    .input-area input:focus { outline: none; }
    .input-area button {
      padding: 12px 20px;
      background: #00ff88;
      border: none;
      border-radius: 25px;
      color: #16213e;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .input-area button:hover { transform: scale(1.05); }
    .input-area .icon-btn {
      background: #2a2a3a;
      color: white;
      padding: 12px;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      margin-right: 8px;
    }
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast {
      background: #333;
      padding: 10px 20px;
      border-radius: 8px;
      margin-top: 5px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .emoji-picker {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: #2a2a3a;
      border-radius: 12px;
      padding: 10px;
      display: none;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
      z-index: 1000;
    }
    .emoji-picker.active { display: grid; }
    .emoji-picker span {
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
      text-align: center;
      border-radius: 8px;
    }
    .emoji-picker span:hover { background: #3a3a4a; }
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .image-modal.active { display: flex; }
    .image-modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>📚 BMC Study Buddy</h1>
    <p>Real-time chat with file sharing & emojis</p>
    <select id="user-select">
      <option value="Landon Duvall|bmcstudybuddy">Landon Duvall</option>
      <option value="Zach Burgdorf|bmcstudy buddy">Zach Burgdorf</option>
      <option value="Jaxon Maddox|bmcstudybuddy">Jaxon Maddox</option>
    </select>
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Join Chat →</button>
  </div>
</div>

<div id="main-app" class="main-app">
  <div class="navbar">
    <div class="logo">📚 <span>BMC</span> Study Buddy</div>
    <div>
      <button onclick="createZoomMeet()" style="background:#4285f4; padding:8px 16px; border:none; border-radius:20px; color:white; cursor:pointer; margin-right:10px;">🎥 Zoom</button>
      <button onclick="logout()" style="background:#ff4444; padding:8px 16px; border:none; border-radius:20px; color:white; cursor:pointer;">Logout</button>
    </div>
  </div>
  <div class="chat-container">
    <div class="sidebar">
      <h3>📢 CHANNELS</h3>
      <ul class="channel-list" id="channel-list"></ul>
      <h3>👥 ONLINE (<span id="online-count">0</span>)</h3>
      <ul class="online-list" id="online-list"></ul>
    </div>
    <div class="chat-area">
      <div class="chat-header">
        <h2 id="current-channel">Global Lounge</h2>
        <div class="chat-actions">
          <i class="fas fa-file-upload" onclick="document.getElementById('file-input').click()" title="Share file"></i>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button class="icon-btn" onclick="toggleEmojiPicker()"><i class="fas fa-smile"></i></button>
        <input type="text" id="message-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send →</button>
        <input type="file" id="file-input" style="display:none;" accept="image/*, .pdf, .doc, .txt">
      </div>
      <div class="emoji-picker" id="emoji-picker">
        <span>😀</span><span>😂</span><span>😍</span><span>🎉</span><span>❤️</span><span>👍</span><span>🔥</span><span>💯</span>
        <span>🤔</span><span>😢</span><span>😎</span><span>🙏</span><span>💪</span><span>👋</span><span>✨</span><span>⭐</span>
        <span>📚</span><span>🎓</span><span>💻</span><span>📝</span><span>✅</span><span>⚠️</span><span>💡</span><span>🎯</span>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<div id="image-modal" class="image-modal" onclick="closeImageModal()"><img id="modal-image" src=""></div>

<script>
const socket = io({ transports: ['polling', 'websocket'] });

let currentUser = null;
let currentChannel = 'Global Lounge';
let messages = {};
let nextMessageId = 1;
const channels = ['Global Lounge', 'Study Help', 'General', 'Random'];

const users = [
  { name: 'Landon Duvall', email: 'student_duvala82@bmcchs.org', password: 'bmcstudybuddy', grade: '11th Grade' },
  { name: 'Zach Burgdorf', email: 'student_burgza45@bmcchs.org', password: 'bmcstudy buddy', grade: '11th Grade' },
  { name: 'Jaxon Maddox', email: 'jaxonmad66@bmcchs.org', password: 'bmcstudybuddy', grade: '9th Grade' }
];

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function login() {
  const select = document.getElementById('user-select');
  const [name, password] = select.value.split('|');
  const inputPassword = document.getElementById('password').value;
  
  const user = users.find(u => u.name === name && u.password === inputPassword);
  
  if (user) {
    currentUser = { name: user.name, email: user.email, grade: user.grade };
    socket.emit('user-join', { name: currentUser.name, email: currentUser.email });
    
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    
    renderChannels();
    switchChannel('Global Lounge');
    showToast(`Welcome back, ${user.name}! 🎉`, 'success');
  } else {
    showToast('Invalid password', 'error');
  }
}

function renderChannels() {
  const channelList = document.getElementById('channel-list');
  channelList.innerHTML = '';
  channels.forEach(channel => {
    const li = document.createElement('li');
    li.textContent = channel;
    li.onclick = () => switchChannel(channel);
    if (channel === currentChannel) li.classList.add('active');
    channelList.appendChild(li);
  });
}

function switchChannel(channel) {
  currentChannel = channel;
  document.getElementById('current-channel').textContent = channel;
  document.querySelectorAll('.channel-list li').forEach(li => {
    if (li.textContent === channel) li.classList.add('active');
    else li.classList.remove('active');
  });
  socket.emit('join-room', { room: channel });
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';
  if (messages[channel]) renderMessages(messages[channel]);
}

function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;
  
  socket.emit('send-message', {
    room: currentChannel,
    user: currentUser.name,
    text: text
  });
  input.value = '';
}

function sendFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const fileData = e.target.result;
    let messageText = '';
    
    if (file.type.startsWith('image/')) {
      messageText = `<img src="${fileData}" onclick="showImageModal('${fileData}')">`;
    } else {
      messageText = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
    }
    
    socket.emit('send-message', {
      room: currentChannel,
      user: currentUser.name,
      text: messageText
    });
  };
  reader.readAsDataURL(file);
  showToast(`Uploading ${file.name}...`, 'info');
}

function renderMessages(msgs) {
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';
  msgs.forEach(msg => {
    const div = document.createElement('div');
    const isOwn = msg.sender === currentUser.name;
    const isSystem = msg.sender === 'System';
    
    div.className = 'message';
    if (isOwn) div.classList.add('own');
    else if (isSystem) div.classList.add('system');
    else div.classList.add('other');
    
    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    div.innerHTML = `
      ${!isSystem ? `<div class="sender">${msg.sender}</div>` : ''}
      <div>${msg.text}</div>
      <div class="time">${time}</div>
    `;
    messagesDiv.appendChild(div);
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addMessage(user, text, timestamp, isOwn = false, isSystem = false) {
  if (!messages[currentChannel]) messages[currentChannel] = [];
  messages[currentChannel].push({
    id: nextMessageId++,
    sender: user,
    text: text,
    timestamp: timestamp
  });
  renderMessages(messages[currentChannel]);
}

function renderOnlineUsers(userList) {
  const onlineList = document.getElementById('online-list');
  document.getElementById('online-count').textContent = userList.length;
  onlineList.innerHTML = '';
  userList.forEach(user => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="online-dot"></span> ${user}`;
    onlineList.appendChild(li);
  });
}

function createZoomMeet() {
  const meetCode = prompt('Enter Zoom Meet code:', 'abc-defg-hij');
  if (meetCode) {
    const meetLink = `https://zoom.us/j/${meetCode}`;
    socket.emit('send-message', {
      room: currentChannel,
      user: currentUser.name,
      text: `🎥 Zoom Meet: ${meetCode} - Join at ${meetLink}`
    });
    window.open(meetLink, '_blank');
    showToast('Zoom Meet shared!', 'success');
  }
}

function toggleEmojiPicker() {
  document.getElementById('emoji-picker').classList.toggle('active');
}

function showImageModal(src) {
  const modal = document.getElementById('image-modal');
  const img = document.getElementById('modal-image');
  img.src = src;
  modal.classList.add('active');
}

function closeImageModal() {
  document.getElementById('image-modal').classList.remove('active');
}

function logout() { window.location.reload(); }

// Socket events
socket.on('connect', () => console.log('Connected'));
socket.on('receive-message', (data) => {
  if (data.room === currentChannel) {
    addMessage(data.user, data.text, data.timestamp, data.user === currentUser.name);
  } else {
    if (!messages[data.room]) messages[data.room] = [];
    messages[data.room].push({
      id: nextMessageId++,
      sender: data.user,
      text: data.text,
      timestamp: data.timestamp
    });
  }
});
socket.on('user-list', renderOnlineUsers);

// File input handler
document.getElementById('file-input')?.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file && currentUser) sendFile(file);
  e.target.value = '';
});

// Enter key to send
document.getElementById('message-input')?.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// Close emoji picker on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.emoji-picker') && !e.target.closest('#emoji-picker') && !e.target.closest('.icon-btn')) {
    document.getElementById('emoji-picker').classList.remove('active');
  }
});

console.log('BMC Study Buddy with File Sharing & Emojis!');
</script>
</body>
</html>
